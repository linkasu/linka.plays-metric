name: Deploy YC Collector

on:
  workflow_run:
    workflows: [Deploy VPS]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: Exact commit SHA or immutable Git ref
        required: true
      image_tag:
        description: Published collector tag, for example sha-<commit>
        required: true

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production-yc
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || format('sha-{0}', github.event.workflow_run.head_sha) }}
      IDENTITY_JWKS_URL: ${{ vars.IDENTITY_JWKS_URL }}
      IDENTITY_TOKEN_ISSUER: ${{ vars.IDENTITY_TOKEN_ISSUER }}
      IDENTITY_TELEMETRY_AUDIENCES_JSON: ${{ vars.IDENTITY_TELEMETRY_AUDIENCES_JSON }}
      CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
      COLLECTOR_PUBLIC_URL: ${{ vars.COLLECTOR_PUBLIC_URL }}
      TTS_OUTCOME_HMAC_ACTIVE_KEY_ID: ${{ vars.TTS_OUTCOME_HMAC_ACTIVE_KEY_ID }}
      TTS_OUTCOME_SUBJECT_KEY: ${{ vars.TTS_OUTCOME_SUBJECT_KEY }}
      YC_API_GATEWAY_ID: ${{ vars.YC_API_GATEWAY_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}
      - name: Validate production auth configuration
        run: |
          [[ "$IMAGE_TAG" =~ ^sha-[0-9a-f]{40}$ ]]
          if [[ "$DEPLOY_REF" =~ ^[0-9a-f]{40}$ ]]; then
            test "$IMAGE_TAG" = "sha-$DEPLOY_REF"
          fi
          test -n "$IDENTITY_JWKS_URL"
          test -n "$IDENTITY_TOKEN_ISSUER"
          test -n "$IDENTITY_TELEMETRY_AUDIENCES_JSON"
          jq -e 'length == 7 and has("linka-plays") and has("linka-looks") and has("linka-pictures") and has("linka-type") and has("linka-paperboard") and has("linka-site") and has("linka-tts")' <<<"$IDENTITY_TELEMETRY_AUDIENCES_JSON"
          test -n "$COLLECTOR_PUBLIC_URL"
          test -n "$YC_API_GATEWAY_ID"
          test -n "${{ vars.INSTALLATION_HMAC_ACTIVE_KEY_ID }}"
          test -n "${{ vars.INSTALLATION_HMAC_PREVIOUS_KEY_ID }}"
          case "$IDENTITY_JWKS_URL" in https://*) ;; *) exit 1 ;; esac
          case "$COLLECTOR_PUBLIC_URL" in https://*) ;; *) exit 1 ;; esac
          if [[ -n "$TTS_OUTCOME_SUBJECT_KEY" ]]; then
            [[ "$TTS_OUTCOME_SUBJECT_KEY" =~ ^[a-f0-9]{64}$ ]]
            [[ -z "$TTS_OUTCOME_HMAC_ACTIVE_KEY_ID" || "$TTS_OUTCOME_HMAC_ACTIVE_KEY_ID" =~ ^[a-z][a-z0-9-]{0,31}$ ]]
          fi
      - name: Install YC CLI
        run: curl -fsSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
      - name: Configure service account
        env:
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          install -m 600 /dev/null /tmp/yc-key.json
          printf '%s' "$YC_SA_KEY_JSON" > /tmp/yc-key.json
          "$HOME/yandex-cloud/bin/yc" config set service-account-key /tmp/yc-key.json
          "$HOME/yandex-cloud/bin/yc" config set cloud-id "$YC_CLOUD_ID"
          "$HOME/yandex-cloud/bin/yc" config set folder-id "$YC_FOLDER_ID"
      - name: Verify gateway ingress limit
        run: |
          spec="$("$HOME/yandex-cloud/bin/yc" serverless api-gateway get-spec \
            --id "$YC_API_GATEWAY_ID" --format json | jq -er .openapi_spec)"
          case "$spec" in
            *rateLimit:*"rps: 100"*) ;;
            *)
              echo "::error::API Gateway must enforce a global 100 rps limit"
              exit 1
              ;;
          esac
      - name: Snapshot rollback target
        id: rollback-target
        run: |
          container_id="$("$HOME/yandex-cloud/bin/yc" serverless container get \
            --name linka-plays-metric-collector --format json | jq -er .id)"
          revision_id="$("$HOME/yandex-cloud/bin/yc" serverless container revision list \
            --container-id "$container_id" --format json | jq -er 'sort_by(.created_at) | last | .id')"
          printf 'container_id=%s\nrevision_id=%s\n' "$container_id" "$revision_id" >> "$GITHUB_OUTPUT"
      - name: Mirror tested GHCR image to Yandex Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YC_SA_KEY_JSON: ${{ secrets.YC_SA_KEY_JSON }}
          YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
        run: |
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin
          printf '%s' "$YC_SA_KEY_JSON" | docker login cr.yandex --username json_key --password-stdin
          docker buildx imagetools create \
            --tag "cr.yandex/$YC_REGISTRY_ID/linka-plays-metric-collector:$IMAGE_TAG" \
            "ghcr.io/linkasu/linka.plays-metric-collector:$IMAGE_TAG"

      - name: Deploy mirrored image
        id: deploy
        env:
          YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
          YC_RUNTIME_SA_ID: ${{ secrets.YC_RUNTIME_SA_ID }}
          YC_LOCKBOX_SECRET_ID: ${{ secrets.YC_LOCKBOX_SECRET_ID }}
          YC_LOCKBOX_SECRET_VERSION_ID: ${{ secrets.YC_LOCKBOX_SECRET_VERSION_ID }}
          WRITER_URL: ${{ secrets.WRITER_URL }}
        run: |
          audiences_base64="$(printf '%s' "$IDENTITY_TELEMETRY_AUDIENCES_JSON" | base64 --wrap=0)"
          tts_outcome_secret=()
          if [[ -n "$TTS_OUTCOME_SUBJECT_KEY" ]]; then
            tts_outcome_secret=(--secret "environment-variable=TTS_OUTCOME_HMAC_ACTIVE_SECRET,id=$YC_LOCKBOX_SECRET_ID,version-id=$YC_LOCKBOX_SECRET_VERSION_ID,key=tts_outcome_hmac_active_secret")
          fi
          "$HOME/yandex-cloud/bin/yc" serverless container revision deploy \
            --container-name linka-plays-metric-collector \
            --image "cr.yandex/$YC_REGISTRY_ID/linka-plays-metric-collector:$IMAGE_TAG" \
            --cores 1 \
            --memory 256M \
            --execution-timeout 15s \
            --concurrency 16 \
            --service-account-id "$YC_RUNTIME_SA_ID" \
            --environment "LISTEN_ADDR=:8080,WRITER_URL=$WRITER_URL,SERVICE_HMAC_ACTIVE_KEY_ID=collector-2026-07,DEPLOYMENT_ENVIRONMENT=production,INSTALLATION_TOKEN_MAX_AGE=720h,INSTALLATION_HMAC_ACTIVE_KEY_ID=${{ vars.INSTALLATION_HMAC_ACTIVE_KEY_ID }},INSTALLATION_HMAC_PREVIOUS_KEY_ID=${{ vars.INSTALLATION_HMAC_PREVIOUS_KEY_ID }},IDENTITY_JWKS_URL=$IDENTITY_JWKS_URL,IDENTITY_TOKEN_ISSUER=$IDENTITY_TOKEN_ISSUER,IDENTITY_TELEMETRY_AUDIENCES_BASE64=$audiences_base64,IDENTITY_TOKEN_MAX_LIFETIME=15m,CORS_ALLOWED_ORIGINS=$CORS_ALLOWED_ORIGINS,TTS_OUTCOME_HMAC_ACTIVE_KEY_ID=${TTS_OUTCOME_HMAC_ACTIVE_KEY_ID:-default},TTS_OUTCOME_SUBJECT_KEY=$TTS_OUTCOME_SUBJECT_KEY" \
            --secret "environment-variable=INSTALLATION_HMAC_ACTIVE_SECRET,id=$YC_LOCKBOX_SECRET_ID,version-id=$YC_LOCKBOX_SECRET_VERSION_ID,key=installation_hmac_active_secret" \
            --secret "environment-variable=INSTALLATION_HMAC_PREVIOUS_SECRET,id=$YC_LOCKBOX_SECRET_ID,version-id=$YC_LOCKBOX_SECRET_VERSION_ID,key=installation_hmac_previous_secret" \
            --secret "environment-variable=WRITER_HMAC_SECRET,id=$YC_LOCKBOX_SECRET_ID,version-id=$YC_LOCKBOX_SECRET_VERSION_ID,key=writer_hmac_secret" \
            --secret "environment-variable=SERVICE_HMAC_ACTIVE_SECRET,id=$YC_LOCKBOX_SECRET_ID,version-id=$YC_LOCKBOX_SECRET_VERSION_ID,key=service_hmac_active_secret" \
            "${tts_outcome_secret[@]}"
      - name: Verify collector routes
        run: |
          curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 5 \
            "$COLLECTOR_PUBLIC_URL/healthz" | jq -e '.status == "ok"'

          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request POST "$COLLECTOR_PUBLIC_URL/v2/batches" \
            --header 'Content-Type: application/json' --data '{}')"
          test "$status" = 401

          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request POST "$COLLECTOR_PUBLIC_URL/v2/tokens" \
            --header 'Content-Type: application/json' --data '{}')"
          test "$status" = 404
      - name: Roll back failed collector smoke
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          "$HOME/yandex-cloud/bin/yc" serverless container rollback \
            --id "${{ steps.rollback-target.outputs.container_id }}" \
            --revision-id "${{ steps.rollback-target.outputs.revision_id }}"
          curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 5 \
            "$COLLECTOR_PUBLIC_URL/healthz" | jq -e '.status == "ok"'
      - name: Remove deploy service-account key
        if: always()
        run: rm -f /tmp/yc-key.json
