name: Publish Images

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary: [collector, writer, disk-alert, migrate, privacy-worker]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: BINARY=${{ matrix.binary }}
          tags: |
            ghcr.io/linkasu/linka.plays-metric-${{ matrix.binary }}:latest
            ghcr.io/linkasu/linka.plays-metric-${{ matrix.binary }}:sha-${{ github.event.workflow_run.head_sha }}
