name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.3.6.56-alpine
        env:
          CLICKHOUSE_DB: linka_metric
          CLICKHOUSE_USER: integration
          CLICKHOUSE_PASSWORD: integration-ci-only
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --user integration --password integration-ci-only --query 'SELECT 1'"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi
      - run: go test ./...
      - name: Apply ClickHouse migrations
        env:
          CLICKHOUSE_ADDRS: 127.0.0.1:9000
          CLICKHOUSE_ADMIN_USER: integration
          CLICKHOUSE_ADMIN_PASSWORD: integration-ci-only
          CLICKHOUSE_DATABASE: linka_metric
        run: go run ./cmd/migrate
      - name: Run ClickHouse integration tests
        env:
          CLICKHOUSE_INTEGRATION_ADDR: 127.0.0.1:9000
          CLICKHOUSE_INTEGRATION_USER: integration
          CLICKHOUSE_INTEGRATION_PASSWORD: integration-ci-only
        run: go test ./internal/clickhouse -run Integration -count=1
      - run: go vet ./...

  docker:
    needs: go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary: [collector, writer, disk-alert, migrate, privacy-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: BINARY=${{ matrix.binary }}
          tags: linka.plays-metric-${{ matrix.binary }}:ci
